# Render 一键部署：https://render.com → New → Blueprint
# 将本仓库（text 目录）连到 GitHub 后导入此 Blueprint
services:
  - type: web
    name: hepai
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/v1/health
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 8080
      - key: FRONTEND_DIST
        value: /app/dist
      - key: SQLITE_PATH
        value: /app/data/hepai.sqlite
      - key: JWT_SECRET
        generateValue: true
